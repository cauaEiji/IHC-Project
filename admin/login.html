<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área Administrativa | ConectaVaga</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-body">

  <header class="header" style="background:var(--dark-2);">
    <div class="header-inner">
      <a href="../index.html" class="back-btn">← Voltar</a>
      <a href="../index.html" class="logo">
        <span class="logo-icon">💼</span>
        <span class="logo-text">ConectaVaga</span>
      </a>
      <div style="width:80px"></div>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-box">

      <p class="auth-eyebrow">Acesso restrito</p>
      <h1 class="auth-title">Área Administrativa</h1>
      <p class="auth-subtitle">Apenas administradores autorizados podem acessar.</p>

      <div class="card" style="border-top:3px solid var(--dark);">
        <div class="alert alert-warning mb-3">
          <span>Este acesso é restrito a administradores da plataforma.</span>
        </div>

        <form id="adminLoginForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">
              E-mail do administrador <span class="form-required">*</span>
            </label>
            <input class="form-control" type="email" id="email"
              placeholder="admin@conectavaga.com.br" required autocomplete="username">
          </div>

          <div class="form-group">
            <label class="form-label" for="senha">
              Senha <span class="form-required">*</span>
            </label>
            <input class="form-control" type="password" id="senha"
              placeholder="Senha de administrador" required autocomplete="current-password">
          </div>

          <div id="erroLogin" class="alert alert-danger mb-2" style="display:none">
            <span>Credenciais inválidas. Tente novamente.</span>
          </div>

          <button type="submit" class="btn btn-dark btn-full btn-lg mt-1">
            Entrar no painel
          </button>
        </form>
      </div>

      <p class="text-center text-muted mt-3" style="font-size:0.8rem;">
        Problemas para acessar? Entre em contato com a equipe de TI.
      </p>

    </div>
  </main>

  <footer class="footer">
    <p>© 2024 ConectaVaga</p>
  </footer>

  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      if (!email || !senha) {
        document.getElementById('erroLogin').style.display = 'flex';
        return;
      }
      window.location.href = 'dashboard.html';
    });
  </script>

</body>
</html>
